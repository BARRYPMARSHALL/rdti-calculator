<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDTI Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --green: #10b981;
    --blue: #3b82f6;
    --amber: #f59e0b;
    --red: #ef4444;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 { font-size: 1.5rem; font-weight: 700; }
  .header a { color: var(--muted); text-decoration: none; font-size: 0.8rem; }
  .header a:hover { color: var(--text); }
  .header .period {
    display: flex;
    gap: 8px;
  }
  .header .period button {
    background: var(--card);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .header .period button.active {
    background: var(--green);
    color: white;
    border-color: var(--green);
  }
  .header .period button:hover:not(.active) { border-color: var(--muted); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .card .label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .card .value { font-size: 2rem; font-weight: 700; margin-top: 6px; }
  .card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
  .card.primary .value { color: var(--green); }
  .card.amber .value { color: var(--amber); }
  .card.blue .value { color: var(--blue); }

  .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: var(--muted); }

  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 640px) { .bottom-row { grid-template-columns: 1fr; } }

  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 8px 8px 8px 0; border-bottom: 1px solid var(--border); }
  td { padding: 8px 8px 8px 0; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar { height: 6px; border-radius: 3px; background: var(--green); min-width: 4px; }
  .bar-bg { flex: 1; height: 6px; border-radius: 3px; background: var(--border); }

  .last-updated { color: var(--muted); font-size: 0.75rem; text-align: center; margin-top: 24px; }

  .loading { text-align: center; padding: 80px 0; color: var(--muted); }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>📊 RDTI Dashboard</h1>
  <a href="/dashboard/logout">Logout →</a>
  <div class="period">
    <button onclick="loadStats(7)" id="p7">7 days</button>
    <button onclick="loadStats(30)" class="active" id="p30">30 days</button>
    <button onclick="loadStats(90)" id="p90">90 days</button>
    <button onclick="loadStats(365)" id="p365">All time</button>
  </div>
</div>

<div id="content">
  <div class="loading">
    <div class="spinner"></div>
    <div>Loading dashboard...</div>
  </div>
</div>

<div class="last-updated" id="lastUpdated"></div>

<script>
let currentDays = 30;

function loadStats(days) {
  currentDays = days;
  document.querySelectorAll('.period button').forEach(b => b.classList.remove('active'));
  document.getElementById('p' + days).classList.add('active');

  fetch('/api/dashboard-stats?days=' + days)
    .then(r => r.json())
    .then(render)
    .catch(err => {
      document.getElementById('content').innerHTML = '<div class="loading" style="color:var(--red);">⚠️ Error loading data</div>';
    });
}

function render(data) {
  const t = data.totals;
  const revenue = '$' + (t.revenue_cents / 100).toFixed(2);
  const avgRefund = data.avg_refund ? '$' + Number(data.avg_refund).toLocaleString('en-US', {maximumFractionDigits: 0}) : '—';
  const convRate = data.conversion_rate + '%';

  // Build daily trend table
  let dailyRows = '';
  if (data.daily && data.daily.length > 0) {
    const maxViews = Math.max(...data.daily.map(d => d.page_views || 0), 1);
    data.daily.forEach(d => {
      const pct = Math.round((d.page_views || 0) / maxViews * 100);
      dailyRows += `<tr>
        <td>${d.date}</td>
        <td><div class="bar-wrap"><div class="bar-bg"><div class="bar" style="width:${pct}%"></div></div>${d.page_views || 0}</div></td>
        <td>${d.calculations || 0}</td>
        <td>${d.purchases || 0}</td>
        <td>$${((d.revenue_cents || 0) / 100).toFixed(2)}</td>
      </tr>`;
    });
  } else {
    dailyRows = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px;">No data yet for this period</td></tr>';
  }

  // Top industries
  let industryRows = '';
  if (data.top_industries && data.top_industries.length > 0) {
    const maxInd = Math.max(...data.top_industries.map(i => i.cnt), 1);
    data.top_industries.forEach(i => {
      const pct = Math.round(i.cnt / maxInd * 100);
      industryRows += `<tr>
        <td>${i.industry || 'Unknown'}</td>
        <td><div class="bar-wrap"><div class="bar-bg"><div class="bar" style="width:${pct}%;background:var(--blue)"></div></div>${i.cnt}</div></td>
      </tr>`;
    });
  }

  document.getElementById('content').innerHTML = `
    <div class="grid">
      <div class="card primary">
        <div class="label">Page Views</div>
        <div class="value">${t.page_views}</div>
        <div class="sub">${data.period_days}-day period</div>
      </div>
      <div class="card">
        <div class="label">Calculations</div>
        <div class="value">${t.calculations}</div>
        <div class="sub">${data.period_days > 0 ? Math.round(t.calculations / data.period_days * 7) + '/wk avg' : '—'}</div>
      </div>
      <div class="card">
        <div class="label">Purchases</div>
        <div class="value">${t.purchases}</div>
        <div class="sub">${convRate} of calculators bought</div>
      </div>
      <div class="card amber">
        <div class="label">Revenue</div>
        <div class="value">${revenue}</div>
        <div class="sub">${t.purchases > 0 ? '$' + Math.round(t.revenue_cents / t.purchases / 100) + ' avg per sale' : '—'}</div>
      </div>
      <div class="card primary">
        <div class="label">Avg Refund Calculated</div>
        <div class="value">${avgRefund}</div>
      </div>
      <div class="card">
        <div class="label">Referral Leads</div>
        <div class="value">${t.referral_leads}</div>
        <div class="sub">Accountant referrals captured</div>
      </div>
    </div>

    <div class="bottom-row">
      <div class="table-wrap">
        <div class="section-title">📈 Daily Trend (${data.period_days} days)</div>
        <table>
          <thead><tr><th>Date</th><th>Views</th><th>Calc</th><th>Purch</th><th>Revenue</th></tr></thead>
          <tbody>${dailyRows}</tbody>
        </table>
      </div>
      <div class="table-wrap">
        <div class="section-title">🏭 Top Industries</div>
        <table>
          <thead><tr><th>Industry</th><th>Calculations</th></tr></thead>
          <tbody>${industryRows}</tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
}

// Load on page load
loadStats(30);
// Auto-refresh every 30 seconds
setInterval(() => loadStats(currentDays), 30000);
</script>
</body>
</html>
