<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-card h1 { font-size: 1.3rem; margin-bottom: 4px; }
  .login-card p { color: #94a3b8; font-size: 0.85rem; margin-bottom: 24px; }
  .login-card input {
    width: 100%;
    padding: 12px 16px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    color: #f1f5f9;
    font-size: 1.5rem;
    text-align: center;
    letter-spacing: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-card input:focus { border-color: #10b981; }
  .login-card button {
    width: 100%;
    padding: 12px;
    background: #10b981;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    margin-top: 16px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-card button:hover { background: #059669; }
</style>
</head>
<body>
  <div class="login-card">
    <h1>🔐 RDTI Dashboard</h1>
    <p>Enter your access code</p>
    <input type="password" id="codeInput" maxlength="4" inputmode="numeric" autofocus
           onkeydown="if(event.key==='Enter')go()">
    <button onclick="go()">Unlock</button>
  </div>
  <script>
    function go() {
      var code = document.getElementById('codeInput').value.trim();
      if (code) {
        window.location.href = '/dashboard?code=' + encodeURIComponent(code);
      }
    }
  </script>
</body>
</html>
